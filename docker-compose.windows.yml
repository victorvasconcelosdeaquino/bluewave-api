version: '3.8'

networks:
  bluewave-network:
    driver: bridge

services:
  # Data Storage
  postgres:
    image: postgres:16-alpine
    container_name: bluewave-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bluewave
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bluewave-network
    restart: unless-stopped

  # Distributed Cache
  redis:
    image: redis:alpine
    container_name: bluewave-redis
    ports:
      - "6379:6379"
    networks:
      - bluewave-network
    restart: unless-stopped

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bluewave-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bluewave-network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  rabbitmq_data:
    driver: local
